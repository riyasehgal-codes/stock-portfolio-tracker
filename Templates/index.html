<!DOCTYPE html>
<html>
<head><title>Portfolio Tracker</title></head>
<body>
    <h1>Stock Portfolio Tracker</h1>

    <form action="/add" method="POST">
        <input name="ticker" placeholder="Ticker e.g. AAPL" required>
        <input name="qty" type="number" placeholder="Quantity" required>
        <input name="buy_price" type="number" step="0.01" placeholder="Buy Price" required>
        <input name="buy_date" type="date" required>
        <button type="submit">Add Stock</button>
    </form>

    <h2>Your Holdings</h2>
    <table border="1">
        <tr><th>Ticker</th><th>Qty</th><th>Buy Price</th><th>Date</th><th>Action</th></tr>
        {% for h in holdings %}
        <tr>
            <td>{{ h.ticker }}</td>
            <td>{{ h.qty }}</td>
            <td>{{ h.buy_price }}</td>
            <td>{{ h.buy_date }}</td>
            <td><a href="/delete/{{ h.id }}">Delete</a></td>
        </tr>
        {% endfor %}
    </table>

    <a href="/dashboard"><button>View Dashboard</button></a>
</body>
</html>
